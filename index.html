<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHROMAKEY — Spectral Background Remover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">

    <header>
      <div class="brand">
        <div class="brand-name">CHROMAKEY</div>
        <div class="brand-tag">Spectral Background Remover</div>
      </div>
      <div class="live">
        <div class="live-dot"></div>
        <span>Live</span>
      </div>
    </header>

    <main>
      <div class="viewport-wrap">
        <div class="viewport-info">
          <span><span class="k">RES</span><span id="resReadout">—</span></span>
        </div>
        <div class="mode-indicator">
          <span class="dot"></span><span id="viewportMode">Mask Overlay</span>
        </div>
        <div class="viewport" id="viewport">
          <div class="empty-state" id="emptyState">
            <div class="empty-plus">+</div>
            <div class="empty-title">DROP IMAGE</div>
            <div class="empty-sub">PNG<span class="sep">·</span>JPG<span class="sep">·</span>WEBP</div>
          </div>
          <canvas id="displayCanvas" style="display:none;"></canvas>
          <input type="file" id="fileInput" class="file-input" accept="image/png,image/jpeg,image/webp">
        </div>
        <div class="zoom-controls" id="zoomControls">
          <button class="zoom-btn" id="zoomOut" title="Zoom out">−</button>
          <button class="zoom-label" id="zoomLabel" title="Fit to screen">100%</button>
          <button class="zoom-btn" id="zoomIn" title="Zoom in">+</button>
        </div>
      </div>

      <aside class="panel">

        <div class="panel-section">
          <div class="section-label">
            <span>Wavelength</span>
            <span class="symbol">λ</span>
          </div>
          <div class="readout">
            <div class="readout-value">
              <span id="wavelengthMinValue">380</span><span class="sep">—</span><span id="wavelengthMaxValue">700</span><span class="unit">nm</span>
            </div>
          </div>
          <div class="histogram">
            <canvas id="wavelengthHist"></canvas>
          </div>
          <div class="dual-slider" id="wavelengthSlider" data-min="380" data-max="700">
            <div class="track track-spectrum"></div>
            <div class="dim-left"></div>
            <div class="dim-right"></div>
            <div class="handle handle-min"></div>
            <div class="handle handle-max"></div>
          </div>
        </div>

        <div class="panel-section">
          <div class="section-label">
            <span>Intensity</span>
            <span class="symbol">I</span>
          </div>
          <div class="readout">
            <div class="readout-value">
              <span id="intensityMinValue">0</span><span class="sep">—</span><span id="intensityMaxValue">100</span><span class="unit">%</span>
            </div>
          </div>
          <div class="histogram">
            <canvas id="intensityHist"></canvas>
          </div>
          <div class="dual-slider" id="intensitySlider" data-min="0" data-max="100">
            <div class="track track-intensity"></div>
            <div class="dim-left"></div>
            <div class="dim-right"></div>
            <div class="handle handle-min"></div>
            <div class="handle handle-max"></div>
          </div>
        </div>

        <div class="panel-section">
          <div class="section-label">
            <span>Feather</span>
            <span class="symbol">≈</span>
          </div>
          <div class="readout">
            <div class="readout-value">
              <span id="featherValue">0.0</span><span class="unit">px</span>
            </div>
          </div>
          <input type="range" id="featherSlider" class="single-slider" min="0" max="20" value="0" step="0.1">
        </div>

        <div class="panel-section">
          <div class="section-label">
            <span>View</span>
            <span class="symbol">◎</span>
          </div>
          <div class="toggle-group">
            <button class="toggle-btn active" data-mode="mask">Mask</button>
            <button class="toggle-btn" data-mode="output">Output</button>
            <button class="toggle-btn" data-mode="original">Source</button>
          </div>

          <div class="options">
            <div class="option">
              <span class="option-label">Invert mask</span>
              <button class="switch" id="invertSwitch" data-on="false" aria-label="Invert mask">
                <span class="switch-track"><span class="switch-thumb"></span></span>
              </button>
            </div>
            <div class="option">
              <span class="option-label">Output bg</span>
              <div class="segmented" id="outputBgToggle">
                <button class="seg active" data-bg="transparent">Trans</button>
                <button class="seg" data-bg="white">White</button>
              </div>
            </div>
          </div>

          <div class="stats">
            <div class="stat">
              <div class="k">Keyed</div>
              <div class="v"><span id="selectedPercent">0.0</span><span class="unit">%</span></div>
            </div>
            <div class="stat">
              <div class="k">Pixels</div>
              <div class="v" style="font-size:22px;"><span id="pixelCount">0</span></div>
            </div>
          </div>

          <div class="sample">
            <div class="sample-swatch" id="sampleSwatch"></div>
            <div class="sample-text empty" id="sampleText">Hover to sample</div>
          </div>
        </div>

        <div class="panel-section" style="margin-top:auto;">
          <button class="btn" id="exportBtn" disabled>Export PNG</button>
          <button class="btn btn-secondary" id="resetBtn" disabled>Reset</button>
        </div>
      </aside>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
